rules:
  - id: qsdev.core.typescript.cmdi-child-process
    languages: [typescript]
    severity: ERROR
    message: >
      User-controlled input flows into child_process.exec() or execSync(),
      which invokes a shell. Use child_process.execFile() or
      child_process.spawn() with an argument array instead, which bypass
      the shell and prevent command injection.
    mode: taint
    pattern-sources:
      - pattern: req.query
      - pattern: req.params
      - pattern: req.body
    pattern-sinks:
      - pattern: exec($CMD)
      - pattern: execSync($CMD)
      - pattern: child_process.exec($CMD)
      - pattern: child_process.execSync($CMD)
    pattern-sanitizers:
      - pattern: execFile(...)
      - pattern: spawn(...)
    metadata:
      category: security
      subcategory: cmdi
      confidence: HIGH
      impact: HIGH
      likelihood: HIGH
      cwe: CWE-78
      owasp: "A03:2021"
      technology: [node]

  - id: qsdev.core.python.cmdi-subprocess-shell
    languages: [python]
    severity: ERROR
    message: >
      User-controlled input flows into subprocess with shell=True or
      os.system(). Use subprocess.run() with an argument list and
      shell=False (the default), or use shlex.quote() to escape
      shell metacharacters if a shell is unavoidable.
    mode: taint
    pattern-sources:
      - pattern: request.args.get(...)
      - pattern: request.args[...]
      - pattern: request.form.get(...)
      - pattern: request.form[...]
      - pattern: request.GET.get(...)
      - pattern: request.GET[...]
      - pattern: request.POST.get(...)
      - pattern: request.POST[...]
    pattern-sinks:
      - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
      - pattern: subprocess.run($CMD, ..., shell=True, ...)
      - pattern: subprocess.call($CMD, ..., shell=True, ...)
      - pattern: os.system($CMD)
      - pattern: os.popen($CMD)
    pattern-sanitizers:
      - pattern: shlex.quote(...)
      - pattern: shlex.split(...)
    metadata:
      category: security
      subcategory: cmdi
      confidence: HIGH
      impact: HIGH
      likelihood: HIGH
      cwe: CWE-78
      owasp: "A03:2021"
      technology: [python]

  - id: qsdev.core.go.cmdi-exec-command
    languages: [go]
    severity: ERROR
    message: >
      User-controlled input flows into exec.Command() invoked via a shell
      (sh -c, bash -c). Pass the program and arguments directly to
      exec.Command() without a shell wrapper:
      exec.Command("ls", "-la", userDir) instead of
      exec.Command("sh", "-c", "ls -la " + userDir).
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get(...)
      - pattern: $R.FormValue(...)
      - pattern: $R.PostFormValue(...)
      - pattern: $C.Query(...)
      - pattern: $C.Param(...)
      - pattern: $C.PostForm(...)
    pattern-sinks:
      - pattern: exec.Command("sh", "-c", $CMD)
      - pattern: exec.Command("bash", "-c", $CMD)
      - pattern: exec.Command("/bin/sh", "-c", $CMD)
      - pattern: exec.Command("/bin/bash", "-c", $CMD)
    pattern-sanitizers:
      - pattern: strconv.Atoi(...)
      - pattern: strconv.ParseInt(...)
      - pattern: filepath.Base(...)
    metadata:
      category: security
      subcategory: cmdi
      confidence: HIGH
      impact: HIGH
      likelihood: HIGH
      cwe: CWE-78
      owasp: "A03:2021"
      technology: [go]
