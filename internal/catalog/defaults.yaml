tiers:
    full:
        order: 3
        inherits: standard
        description: 'Full tooling: MCP servers, agent tools, consulting workflows, AlwaysOn tools'
        default_permission_preset: standard
        security:
            level: enhanced
        tools:
            enabled:
                - semgrep
                - gitleaks
                - secretspec
        claude_code:
            permission_level: standard
            mcp_servers:
                - context7
                - github
    standard:
        order: 2
        inherits: supply-chain-only
        description: Supply chain deny rules + Claude Code governance + CLAUDE.md + gitleaks
        default_permission_preset: standard
        tools:
            enabled:
                - gitleaks
        claude_code:
            permission_level: standard
    supply-chain-only:
        order: 1
        description: Package supply chain security + devenv sandbox; no Claude Code restrictions
        default_permission_preset: supply-chain-only
        security:
            level: baseline
            age_gating: true
            script_blocking: true
            lock_enforcement: true
            vuln_scanning: true
        tools:
            enabled: []
        claude_code:
            enabled: true
            permission_level: supply-chain-only
compliance:
    baseline:
        order: 0
        age_gating_threshold_hours: 72
        script_blocking: true
        required_pre_commit_hooks:
            - ripsecrets
            - gitleaks
        mcp_server_policy: allow-list
        claude_permission_level: standard
        claude_audit_log: false
        sbom_policy: "off"
        license_scanning: false
    enhanced:
        order: 1
        age_gating_threshold_hours: 168
        script_blocking: true
        required_pre_commit_hooks:
            - ripsecrets
            - gitleaks
            - semgrep
        mcp_server_policy: allow-list
        claude_permission_level: standard
        claude_audit_log: false
        sbom_policy: on-release
        license_scanning: false
    strict:
        order: 2
        age_gating_threshold_hours: 336
        script_blocking: true
        required_pre_commit_hooks:
            - ripsecrets
            - gitleaks
            - semgrep
            - license-compliance
        mcp_server_policy: explicit-only
        claude_permission_level: restricted
        claude_audit_log: true
        sbom_policy: every-build
        license_scanning: true
profiles:
    full:
        tier: full
        description: 'Full tooling: MCP servers, agent tools, consulting workflows, AlwaysOn tools'
        security:
            level: enhanced
            age_gating: true
            script_blocking: true
            lock_enforcement: true
            vuln_scanning: true
        tools:
            enabled:
                - semgrep
                - gitleaks
                - secretspec
        claude_code:
            enabled: true
            permission_level: standard
            mcp_servers:
                - context7
                - github
    standard:
        tier: standard
        description: Supply chain deny rules + Claude Code governance + CLAUDE.md + gitleaks
        security:
            level: baseline
            age_gating: true
            script_blocking: true
            lock_enforcement: true
            vuln_scanning: true
        tools:
            enabled:
                - gitleaks
        claude_code:
            enabled: true
            permission_level: standard
    supply-chain-only:
        tier: supply-chain-only
        description: Package supply chain security + devenv sandbox; no Claude Code restrictions
        security:
            level: baseline
            age_gating: true
            script_blocking: true
            lock_enforcement: true
            vuln_scanning: true
        tools:
            enabled: []
        claude_code:
            enabled: true
            permission_level: supply-chain-only
