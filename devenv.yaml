# Generated by qsdev init — security-hardened devenv configuration.
# See https://devenv.sh/reference/yaml-options/ for all options.
require_version: '>=2.1'
inputs:
    nixpkgs:
        url: github:NixOS/nixpkgs/nixpkgs-unstable
    git-hooks:
        url: github:cachix/git-hooks.nix
        inputs:
            nixpkgs:
                follows: nixpkgs
impure: false
allow_unfree: true
allow_broken: false
permitted_unfree_packages: []
permitted_insecure_packages: []
clean:
    enabled: true
    keep:
        - TERM
        - COLORTERM
        - HOME
        - USER
        - LOGNAME
        - DISPLAY
        - WAYLAND_DISPLAY
        - XDG_RUNTIME_DIR
        - XDG_SESSION_TYPE
        - SSH_AUTH_SOCK
        - LANG
        - LC_ALL
        - NIX_SSL_CERT_FILE
        - SSL_CERT_FILE
