# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - rm -rf dist_share/completions
    - mkdir -p dist_share/completions
    - "sh -c 'CGO_ENABLED=0 go build -o dist_share/qsdev ./cmd/qsdev'"
    - "sh -c 'dist_share/qsdev completion bash > dist_share/completions/qsdev.bash'"
    - "sh -c 'dist_share/qsdev completion zsh > dist_share/completions/qsdev.zsh'"
    - "sh -c 'dist_share/qsdev completion fish > dist_share/completions/qsdev.fish'"

builds:
  - id: qsdev
    main: ./cmd/qsdev
    binary: qsdev
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/Quantum-Serendipity/qsdev/internal/version.version={{.Version}}
      - -X github.com/Quantum-Serendipity/qsdev/internal/version.commit={{.Commit}}
      - -X github.com/Quantum-Serendipity/qsdev/internal/version.date={{.CommitDate}}
      - -X github.com/Quantum-Serendipity/qsdev/internal/version.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: bin-archives
    format: tar.gz
    name_template: >-
      qsdev_{{- .Version }}_
      {{- if eq .Os "darwin" }}Darwin
      {{- else if eq .Os "linux" }}Linux
      {{- else if eq .Os "windows" }}Windows
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - src: dist_share/completions/*
        dst: completions/
        strip_parent: true

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: Quantum-Serendipity
    name: qsdev
  prerelease: auto
  draft: false
  name_template: "v{{ .Version }}"

nfpms:
  - id: qsdev-linux
    package_name: qsdev
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: Quantum Serendipity Software
    homepage: https://github.com/Quantum-Serendipity/qsdev
    maintainer: "Quantum Serendipity Software <colin.rushton@quantumserendipitysoftware.com>"
    description: "Secure developer environment bootstrapping tool"
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    bindir: /usr/local/bin
    contents:
      - dst: /usr/share/bash-completion/completions
        type: dir
      - dst: /usr/share/zsh/vendor-completions
        type: dir
      - dst: /usr/share/fish/vendor_completions.d
        type: dir
      - src: dist_share/completions/qsdev.bash
        dst: /usr/share/bash-completion/completions/qsdev
        file_info:
          mode: 0644
      - src: dist_share/completions/qsdev.zsh
        dst: /usr/share/zsh/vendor-completions/_qsdev
        file_info:
          mode: 0644
      - src: dist_share/completions/qsdev.fish
        dst: /usr/share/fish/vendor_completions.d/qsdev.fish
        file_info:
          mode: 0644

brews:
  - name: qsdev
    repository:
      owner: Quantum-Serendipity
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/Quantum-Serendipity/qsdev
    description: "Secure developer environment bootstrapping tool"
    install: |
      bin.install "qsdev"
      bash_completion.install "completions/qsdev.bash" => "qsdev"
      zsh_completion.install "completions/qsdev.zsh" => "_qsdev"
      fish_completion.install "completions/qsdev.fish"

scoops:
  - name: qsdev
    homepage: https://github.com/Quantum-Serendipity/qsdev
    description: "Secure developer environment bootstrapping tool"
    repository:
      owner: Quantum-Serendipity
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_TAP_GITHUB_TOKEN }}"

signs:
  - artifacts: checksum
    cmd: gpg
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sig"
      - "${artifact}"
