tools:
    agent-postmortem:
        display_name: Agent Postmortem Protocol
        category: ai-agent
        description: Verification skill requiring agents to validate changes against build/test/lint after implementation
        default_policy: always-on
        toggle_field: agent_tools.postmortem_enabled
        mcp_server_name: agent-postmortem
        owned_files:
            - path: .claude/skills/agent-postmortem/SKILL.md
              ownership: exclusive
            - path: .mcp.json
              ownership: shared
              section_id: agent-postmortem
            - path: CLAUDE.md
              ownership: shared
              section_id: agent-postmortem
              section_content: "- Agent-postmortem skill is active."
    attach-guard:
        display_name: Package Install Guard
        category: security
        description: PreToolUse hook blocking unverified package installs with age-gating and vulnerability checks
        default_policy: always-on
        toggle_field: hooks.safety_block
        owned_files:
            - path: .claude/hooks/package-guard.py
              ownership: exclusive
            - path: .claude/settings.json
              ownership: shared
              section_id: attach-guard
            - path: CLAUDE.md
              ownership: shared
              section_id: attach-guard
              section_content: "- Safety-block hooks are enabled."
    branch-naming:
        display_name: Branch Naming Convention
        category: devex
        description: Pre-push hook enforcing branch naming conventions (feat|fix|chore|docs|refactor|test|ci/<description>)
        default_policy: always-on
        owned_files:
            - path: devenv.nix
              ownership: shared
              section_id: branch-naming
    changelog:
        display_name: git-cliff Changelog
        category: devex
        description: Generates cliff.toml configuration for git-cliff conventional changelog generation
        default_policy: opt-in
        owned_files:
            - path: cliff.toml
              ownership: exclusive
            - path: devenv.nix
              ownership: shared
              section_id: changelog
            - path: CLAUDE.md
              ownership: shared
              section_id: changelog
              section_content: "- **git-cliff** generates changelogs from conventional commits."
    commit-ticket:
        display_name: Commit Ticket Extraction
        category: devex
        description: Prepare-commit-msg hook that extracts ticket IDs from branch names into commit messages
        default_policy: opt-in
        owned_files:
            - path: devenv.nix
              ownership: shared
              section_id: commit-ticket
    commitlint:
        display_name: Commitlint
        category: devex
        description: Conventional commit message linting via commitlint with standard type enforcement
        default_policy: opt-in
        owned_files:
            - path: .commitlintrc.yml
              ownership: exclusive
            - path: CLAUDE.md
              ownership: shared
              section_id: commitlint
              section_content: "- **Commitlint** enforces conventional commit message format."
