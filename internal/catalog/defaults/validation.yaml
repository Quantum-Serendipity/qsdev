languages:
  all:
    - go
    - javascript
    - python
    - rust
    - java
    - dotnet
    - docker
    - terraform
    - php
    - ruby
    - scala
    - cpp
    - helm
    - ansible
    - shell
    - elixir
    - dart
    - swift
    - haskell
    - clojure
    - bazel
    - nix
    - perl
    - r
    - lua
    - zig
    - powershell
  core:
    - go
    - javascript
    - python
    - rust
    - java
    - dotnet
    - docker
    - terraform

services:
  - postgres
  - redis
  - mysql
  - mongodb
  - elasticsearch
  - rabbitmq

permission_presets:
  - minimal
  - standard
  - permissive
  - custom
  - supply-chain-only

hook_presets:
  - auto-format
  - safety-block
  - pre-commit
  - audit-log

security_levels:
  - baseline
  - enhanced
  - strict

data_classifications:
  - public
  - internal
  - confidential

package_managers:
  node: [npm, pnpm, yarn, bun]
  python: [pip, uv, poetry]

tool_categories:
  - id: security
    display_name: Security
  - id: ai-agent
    display_name: "AI Agent"
  - id: devex
    display_name: "Developer Experience"
  - id: infrastructure
    display_name: Infrastructure
