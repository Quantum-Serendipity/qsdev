rules:
  - id: qsdev.core.python.xss-fastapi-template-injection
    message: >-
      User-controlled data from a FastAPI endpoint is used to construct a Jinja2
      template string or is passed directly into an HTML response without escaping.
      This enables Cross-Site Scripting (XSS) or Server-Side Template Injection
      (SSTI). Use Jinja2 auto-escaping or markupsafe.escape() to sanitize output.
    languages: [python]
    severity: ERROR
    mode: taint
    metadata:
      cwe: CWE-79
      owasp: A03:2021
      category: security
      subcategory: vuln
      confidence: MEDIUM
      impact: MEDIUM
      likelihood: MEDIUM
      technology: [fastapi, jinja2]
    options:
      taint_assume_safe_booleans: true
      taint_assume_safe_numbers: true
    pattern-sources:
      - patterns:
          - pattern-inside: |
              @$APP.$METHOD($ROUTE, ...)
              def $FUNC(..., $PARAM, ...):
                ...
          - pattern-not-inside: |
              @$APP.$METHOD($ROUTE, ...)
              def $FUNC(..., $PARAM: BackgroundTasks, ...):
                ...
          - pattern-not-inside: |
              @$APP.$METHOD($ROUTE, ...)
              def $FUNC(..., $PARAM: Response, ...):
                ...
          - focus-metavariable: $PARAM
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: Template($TMPL).render(...)
              - pattern: $ENV.from_string($TMPL).render(...)
              - pattern: render_template_string($TMPL, ...)
          - focus-metavariable: $TMPL
      - patterns:
          - pattern-either:
              - pattern: HTMLResponse(content=$CONTENT, ...)
              - pattern: HTMLResponse($CONTENT, ...)
          - focus-metavariable: $CONTENT
    pattern-sanitizers:
      - pattern: bleach.clean(...)
      - pattern: markupsafe.escape(...)
      - pattern: Markup.escape(...)
      - pattern: html.escape(...)
      - pattern: int(...)
      - pattern: float(...)
