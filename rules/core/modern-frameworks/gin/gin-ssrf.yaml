rules:
  - id: qsdev.core.go.ssrf-gin
    message: >-
      User input from Gin request is used as a URL in an outbound HTTP
      request. An attacker could access internal services or cloud metadata
      endpoints (e.g., 169.254.169.254). Validate URLs against an allowlist
      of permitted hosts and schemes.
    languages: [go]
    severity: ERROR
    mode: taint
    metadata:
      cwe: CWE-918
      owasp: A10:2021
      category: security
      subcategory: vuln
      confidence: MEDIUM
      impact: HIGH
      likelihood: MEDIUM
      technology: [gin]
    pattern-sources:
      - pattern-either:
          - pattern: "($CTX : *gin.Context).Param(...)"
          - pattern: "($CTX : *gin.Context).Query(...)"
          - pattern: "($CTX : *gin.Context).DefaultQuery(...)"
          - pattern: "($CTX : *gin.Context).PostForm(...)"
          - pattern: "($CTX : *gin.Context).DefaultPostForm(...)"
          - pattern: "($CTX : *gin.Context).GetHeader(...)"
          - pattern: "($CTX : *gin.Context).Cookie(...)"
      - patterns:
          - pattern-either:
              - pattern: "($CTX : *gin.Context).ShouldBindJSON($BOUND)"
              - pattern: "($CTX : *gin.Context).ShouldBind($BOUND)"
          - focus-metavariable: $BOUND
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: http.Get($URL)
              - pattern: http.Post($URL, ...)
              - pattern: http.Head($URL)
              - pattern: http.NewRequest($METHOD, $URL, ...)
              - pattern: http.NewRequestWithContext($CTX2, $METHOD, $URL, ...)
              - pattern: $CLIENT.Get($URL)
              - pattern: $CLIENT.Post($URL, ...)
              - pattern: $CLIENT.Head($URL)
              - pattern: $CLIENT.PostForm($URL, ...)
          - focus-metavariable: $URL
    pattern-sanitizers:
      - pattern-either:
          - pattern: strconv.Atoi(...)
          - pattern: strconv.ParseInt(...)
