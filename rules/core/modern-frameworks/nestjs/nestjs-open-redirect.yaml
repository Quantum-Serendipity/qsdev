rules:
  - id: qsdev.core.typescript.redirect-nestjs-open-redirect
    message: >-
      User-controlled input from a NestJS parameter decorator is used in a
      redirect URL. This can lead to open redirect, allowing attackers to
      redirect users to malicious sites. Validate redirect URLs against an
      allowlist of trusted domains.
    languages: [typescript]
    severity: WARNING
    mode: taint
    metadata:
      cwe: CWE-601
      owasp: A01:2021
      category: security
      subcategory: vuln
      confidence: MEDIUM
      impact: MEDIUM
      likelihood: MEDIUM
      technology: [nestjs]
    pattern-sources:
      - patterns:
          - pattern-inside: |
              class $CONTROLLER {
                ...
                $METHOD(..., @Query(...) $INPUT, ...) { ... }
                ...
              }
          - focus-metavariable: $INPUT
      - patterns:
          - pattern-inside: |
              class $CONTROLLER {
                ...
                $METHOD(..., @Param(...) $INPUT, ...) { ... }
                ...
              }
          - focus-metavariable: $INPUT
      - patterns:
          - pattern-inside: |
              class $CONTROLLER {
                ...
                $METHOD(..., @Body(...) $INPUT, ...) { ... }
                ...
              }
          - focus-metavariable: $INPUT
      - patterns:
          - pattern-inside: |
              class $CONTROLLER {
                ...
                $METHOD(..., @Headers(...) $INPUT, ...) { ... }
                ...
              }
          - focus-metavariable: $INPUT
    pattern-sinks:
      - patterns:
          - pattern-inside: |
              class $CONTROLLER {
                ...
                @Redirect(...)
                $METHOD(...) { ... }
                ...
              }
          - pattern: |
              return { url: $URL }
          - pattern-not: |
              return { url: "..." }
          - focus-metavariable: $URL
      - patterns:
          - pattern-either:
              - pattern: $RES.redirect($URL)
              - pattern: $RES.redirect($STATUS, $URL)
          - pattern-not: $RES.redirect("...")
          - pattern-not: $RES.redirect($STATUS, "...")
          - focus-metavariable: $URL
