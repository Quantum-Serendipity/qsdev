# Security scanning workflow
# Generated by qsdev — do not edit manually.
name: Security Scan

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate lock files
        run: |
          echo "Checking lock file integrity..."
          # Verify lock files exist and are committed
          for f in package-lock.json pnpm-lock.yaml yarn.lock Cargo.lock go.sum poetry.lock uv.lock; do
            if [ -f "$f" ]; then
              echo "  ✓ $f present"
              git diff --exit-code "$f" || echo "  WARNING: $f has uncommitted changes"
            fi
          done

      - name: OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --recursive
            .
