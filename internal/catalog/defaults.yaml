    - AZURE_CLIENT_SECRET
    - AZURE_TENANT_ID
    - AZURE_SUBSCRIPTION_ID
    - NPM_TOKEN
    - PYPI_TOKEN
    - DOCKER_PASSWORD
    - DOCKER_AUTH_CONFIG
    - CACHIX_AUTH_TOKEN
    - DATABASE_URL
    - DATABASE_PASSWORD
