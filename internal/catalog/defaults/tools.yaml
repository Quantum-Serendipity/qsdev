tools:
  # === Security Tools ===

  attach-guard:
    display_name: "Package Install Guard"
    category: security
    description: "PreToolUse hook blocking unverified package installs with age-gating and vulnerability checks"
    default_policy: always-on
    owned_files:
      - path: .claude/hooks/package-guard.py
        ownership: exclusive
      - path: .claude/settings.json
        ownership: shared
        section_id: attach-guard
      - path: CLAUDE.md
        ownership: shared
        section_id: attach-guard

  semgrep:
    display_name: "Semgrep SAST"
    category: security
    description: "Static analysis via Semgrep with ecosystem-aware rule sets"
    default_policy: always-on
    owned_files:
      - path: .semgrep.yml
        ownership: exclusive
      - path: devenv.nix
        ownership: shared
        section_id: semgrep
      - path: CLAUDE.md
        ownership: shared
        section_id: semgrep

  gitleaks:
    display_name: "Gitleaks Secret Scanner"
    category: security
    description: "Secret detection via Gitleaks with project-specific allowlists"
    default_policy: always-on
    owned_files:
      - path: .gitleaks.toml
        ownership: exclusive
      - path: devenv.nix
        ownership: shared
        section_id: gitleaks
      - path: CLAUDE.md
        ownership: shared
        section_id: gitleaks

  container-security:
    display_name: "Container Security (Grype + Cosign)"
    category: security
    description: "Container vulnerability scanning with Grype and image signing with Cosign"
    default_policy: on-when-detected
    owned_files:
      - path: .grype.yaml
        ownership: exclusive
      - path: .cosign/policy.yaml
        ownership: exclusive
      - path: devenv.nix
        ownership: shared
        section_id: container-security
      - path: CLAUDE.md
        ownership: shared
        section_id: container-security

  license-compliance:
    display_name: "License Compliance (ScanCode)"
    category: security
    description: "License compliance checking via ScanCode with SPDX allowlist/blocklist policies"
    default_policy: opt-in
    owned_files:
      - path: .scancode.yml
        ownership: exclusive
      - path: .license-exceptions.yml
        ownership: exclusive
      - path: CLAUDE.md
        ownership: shared
        section_id: license-compliance

  # === AI Agent Tools ===

  agent-postmortem:
    display_name: "Agent Postmortem Protocol"
    category: ai-agent
    description: "Verification skill requiring agents to validate changes against build/test/lint after implementation"
    default_policy: always-on
    owned_files:
      - path: .claude/skills/agent-postmortem/SKILL.md
        ownership: exclusive
      - path: CLAUDE.md
        ownership: shared
        section_id: agent-postmortem

  version-sentinel:
    display_name: "Version Sentinel"
    category: ai-agent
    description: "Guards dependency version changes in manifest files, requiring agents to justify bumps"
    default_policy: always-on
    owned_files:
      - path: .claude/skills/version-sentinel/SKILL.md
        ownership: exclusive
      - path: .version-sentinel/ignore
        ownership: exclusive
      - path: CLAUDE.md
        ownership: shared
        section_id: version-sentinel

  semble:
    display_name: "Semble Semantic Code Search"
    category: ai-agent
    description: "Semantic code search via MCP server or sub-agent for codebase navigation"
    default_policy: always-on
    owned_files:
      - path: .mcp.json
        ownership: shared
        section_id: semble
      - path: .claude/agents/semble-search.md
        ownership: exclusive
      - path: CLAUDE.md
        ownership: shared
        section_id: semble

  trail-of-bits-skills:
    display_name: "Trail of Bits Security Skills"
    category: ai-agent
    description: "Security-focused code review skills based on Trail of Bits audit methodology"
    default_policy: always-on
    owned_files:
      - path: .claude/skills/security-review.md
        ownership: exclusive
      - path: CLAUDE.md
        ownership: shared
        section_id: trail-of-bits-skills

  context7:
    display_name: "Context7 MCP"
    category: ai-agent
    description: "Context7 MCP server providing library documentation lookups for AI agents"
    default_policy: always-on
    owned_files:
      - path: .mcp.json
        ownership: shared
        section_id: context7
      - path: CLAUDE.md
        ownership: shared
        section_id: context7

  github-mcp:
    display_name: "GitHub MCP"
    category: ai-agent
    description: "GitHub MCP server for repository and issue management by AI agents"
    default_policy: always-on
    owned_files:
      - path: .mcp.json
        ownership: shared
        section_id: github-mcp
      - path: CLAUDE.md
        ownership: shared
        section_id: github-mcp

  socket-dev-mcp:
    display_name: "Socket.dev MCP"
    category: ai-agent
    description: "Socket.dev MCP server for supply chain security analysis of dependencies"
    default_policy: always-on
    owned_files:
      - path: .mcp.json
        ownership: shared
        section_id: socket-dev-mcp
      - path: CLAUDE.md
        ownership: shared
        section_id: socket-dev-mcp

  postgres-mcp:
    display_name: "PostgreSQL MCP"
    category: ai-agent
    description: "PostgreSQL MCP server for database schema inspection and query execution by AI agents"
    default_policy: opt-in
    owned_files:
      - path: .mcp.json
        ownership: shared
        section_id: postgres-mcp
      - path: CLAUDE.md
        ownership: shared
        section_id: postgres-mcp

