        owned_files:
            - path: secretspec.toml
              ownership: exclusive
            - path: devenv.nix
              ownership: shared
              section_id: secretspec
            - path: CLAUDE.md
              ownership: shared
              section_id: secretspec
              section_content: "- **Secret Specification** declares required secrets for services and ecosystem modules."
    semble:
        display_name: Semble Semantic Code Search
        category: ai-agent
        description: Semantic code search via MCP server or sub-agent for codebase navigation
        default_policy: always-on
        owned_files:
            - path: .mcp.json
              ownership: shared
              section_id: semble
            - path: .claude/agents/semble-search.md
              ownership: exclusive
            - path: CLAUDE.md
              ownership: shared
              section_id: semble
              section_content: "- **Semble** semantic search available."
    semgrep:
        display_name: Semgrep SAST
        category: security
        description: Static analysis via Semgrep with ecosystem-aware rule sets
        default_policy: always-on
        nix_expr: '(pkgs.writeShellScriptBin "semgrep" "exec -a osemgrep ''''${pkgs.semgrep-core}/bin/semgrep-core --experimental \"$@\"")'
        owned_files:
            - path: .semgrep.yml
              ownership: exclusive
            - path: devenv.nix
              ownership: shared
              section_id: semgrep
            - path: CLAUDE.md
              ownership: shared
              section_id: semgrep
              section_content: "- **Semgrep SAST** scans code with ecosystem-aware rule sets."
    socket-dev-mcp:
        display_name: Socket.dev MCP
        category: ai-agent
        description: Socket.dev MCP server for supply chain security analysis of dependencies
        default_policy: always-on
        mcp_server_name: socket
        owned_files:
            - path: .mcp.json
              ownership: shared
              section_id: socket
            - path: CLAUDE.md
              ownership: shared
              section_id: socket-dev-mcp
              section_content: "- **Socket.dev MCP** provides supply chain security analysis of dependencies."
    starship-integration:
        display_name: Starship Prompt Integration
        category: devex
        description: Starship prompt configuration with qsdev project name, security profile, and tool count segments
        default_policy: opt-in
        owned_files:
            - path: .starship.toml
              ownership: exclusive
            - path: devenv.nix
              ownership: shared
              section_id: starship
    trail-of-bits-skills:
        display_name: Trail of Bits Security Skills
        category: ai-agent
        description: Security-focused code review skills based on Trail of Bits audit methodology
        default_policy: always-on
        skill_name: security-review
        owned_files:
            - path: .claude/skills/security-review.md
              ownership: exclusive
            - path: CLAUDE.md
              ownership: shared
              section_id: trail-of-bits-skills
              section_content: "- Security review skills installed."
    version-sentinel:
        display_name: Version Sentinel
        category: ai-agent
        description: Guards dependency version changes in manifest files, requiring agents to justify bumps
        default_policy: always-on
        mcp_server_name: version-sentinel
        owned_files:
            - path: .claude/skills/version-sentinel/SKILL.md
              ownership: exclusive
            - path: .version-sentinel/ignore
              ownership: exclusive
            - path: .version-sentinel/events.jsonl
              ownership: exclusive
            - path: .mcp.json
              ownership: shared
              section_id: version-sentinel
            - path: CLAUDE.md
              ownership: shared
              section_id: version-sentinel
              section_content: |-
                - **Version-Sentinel** guards dependency changes in: {{ join ", " .Covered }}.
                {{- if .Uncovered }}
                - Version-Sentinel does NOT cover: {{ join ", " .Uncovered }}. Review these manually.
                {{- end }}
security_hooks:
    - ripsecrets
    - check-added-large-files
    - no-commit-to-branch
    - check-merge-conflicts
    - shellcheck
    - statix
base_packages:
