rules:
  - id: qsdev.core.python.cmdi-fastapi-subprocess
    message: >-
      User-controlled data from a FastAPI endpoint is passed to a subprocess call
      with shell=True. This allows arbitrary command execution. Use a list of
      arguments without shell=True, or sanitize input with shlex.quote().
    languages: [python]
    severity: ERROR
    mode: taint
    metadata:
      cwe: CWE-78
      owasp: A03:2021
      category: security
      subcategory: vuln
      confidence: MEDIUM
      impact: HIGH
      likelihood: HIGH
      technology: [fastapi]
    options:
      taint_assume_safe_booleans: true
      taint_assume_safe_numbers: true
    pattern-sources:
      - patterns:
          - pattern-inside: |
              @$APP.$METHOD($ROUTE, ...)
              def $FUNC(..., $PARAM, ...):
                ...
          - pattern-not-inside: |
              @$APP.$METHOD($ROUTE, ...)
              def $FUNC(..., $PARAM: BackgroundTasks, ...):
                ...
          - pattern-not-inside: |
              @$APP.$METHOD($ROUTE, ...)
              def $FUNC(..., $PARAM: Response, ...):
                ...
          - focus-metavariable: $PARAM
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: subprocess.run($CMD, ..., shell=True, ...)
              - pattern: subprocess.call($CMD, ..., shell=True, ...)
              - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
              - pattern: subprocess.check_call($CMD, ..., shell=True, ...)
              - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
          - focus-metavariable: $CMD
      - patterns:
          - pattern-either:
              - pattern: os.system($CMD)
              - pattern: os.popen($CMD, ...)
          - focus-metavariable: $CMD
    pattern-sanitizers:
      - pattern: shlex.quote(...)

  - id: qsdev.core.python.cmdi-fastapi-os-system
    message: >-
      User-controlled data from a FastAPI endpoint is passed to os.system() or
      os.popen(). These functions execute commands through the shell and are
      vulnerable to command injection. Use subprocess with a list of arguments
      instead.
    languages: [python]
    severity: ERROR
    mode: taint
    metadata:
      cwe: CWE-78
      owasp: A03:2021
      category: security
      subcategory: vuln
      confidence: HIGH
      impact: HIGH
      likelihood: HIGH
      technology: [fastapi]
    options:
      taint_assume_safe_booleans: true
      taint_assume_safe_numbers: true
    pattern-sources:
      - patterns:
          - pattern-inside: |
              @$APP.$METHOD($ROUTE, ...)
              def $FUNC(..., $PARAM, ...):
                ...
          - pattern-not-inside: |
              @$APP.$METHOD($ROUTE, ...)
              def $FUNC(..., $PARAM: BackgroundTasks, ...):
                ...
          - pattern-not-inside: |
              @$APP.$METHOD($ROUTE, ...)
              def $FUNC(..., $PARAM: Response, ...):
                ...
          - focus-metavariable: $PARAM
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: os.system($CMD)
              - pattern: os.popen($CMD, ...)
          - focus-metavariable: $CMD
    pattern-sanitizers:
      - pattern: shlex.quote(...)
      - pattern: int(...)
      - pattern: float(...)

  - id: qsdev.core.python.cmdi-fastapi-request-object
    message: >-
      Data accessed directly from the FastAPI/Starlette Request object is passed
      to a shell command. The Request object bypasses Pydantic validation and
      type coercion, making injection trivially exploitable. Never pass raw
      request data to subprocess or os.system.
    languages: [python]
    severity: ERROR
    mode: taint
    metadata:
      cwe: CWE-78
      owasp: A03:2021
      category: security
      subcategory: vuln
      confidence: HIGH
      impact: HIGH
      likelihood: HIGH
      technology: [fastapi]
    options:
      taint_assume_safe_booleans: true
      taint_assume_safe_numbers: true
    pattern-sources:
      - pattern-either:
          - pattern: await $REQ.body()
          - pattern: await $REQ.json()
          - pattern: await $REQ.form()
          - pattern: $REQ.query_params[...]
          - pattern: $REQ.query_params.get(...)
          - pattern: $REQ.path_params[...]
          - pattern: $REQ.headers[...]
          - pattern: $REQ.cookies[...]
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: subprocess.run($CMD, ..., shell=True, ...)
              - pattern: subprocess.call($CMD, ..., shell=True, ...)
              - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
              - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
              - pattern: os.system($CMD)
              - pattern: os.popen($CMD, ...)
          - focus-metavariable: $CMD
    pattern-sanitizers:
      - pattern: shlex.quote(...)
