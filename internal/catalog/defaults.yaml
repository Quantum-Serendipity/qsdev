permission_preset_defs:
    minimal:
        default_mode: plan
        disable_bypass_mode: disable
        allow_sets:
            - minimal
            - minimal_bash_build_test
            - frozen_lockfile_installs
        deny_sets:
            - npx
            - nix
            - system
            - pipe_to_shell
            - shell_wrapping
            - env_command_prefix
            - sudo_prefix
            - subprocess_escape
            - eval_xargs
            - destructive_ops
            - sandbox_config_edits
        ask_sets:
            - minimal_base
            - code_execution
            - js_package_managers
            - python
            - rust
            - go
            - ruby
            - php
    standard:
        default_mode: default
